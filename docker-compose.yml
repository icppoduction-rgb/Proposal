services:
  nginx:
    image: nginx:1.27-alpine
    env_file:
      - .env
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    environment:
      TZ: ${TZ}
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    expose:
      - "3000"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    depends_on:
      log-service:
        condition: service_started
      data-processing-service:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - app-data:/app/app-data
    restart: unless-stopped

  log-service:
    build:
      context: .
      dockerfile: services/log_service/Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    expose:
      - "8002"
    volumes:
      - app-data:/app/app-data
    restart: unless-stopped

  data-processing-service:
    build:
      context: .
      dockerfile: services/data_processing/Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      DATA_PROCESSING_SERVICE_URL: http://data-processing-service:8003
    expose:
      - "8003"
    volumes:
      - app-data:/app/app-data
    restart: unless-stopped

  normalization-data:
    build:
      context: .
      dockerfile: services/normalization_data/Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-data:/app/app-data
    restart: unless-stopped

  training-service:
    build:
      context: .
      dockerfile: services/training_service/Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      model-analiz:
        condition: service_started
    volumes:
      - app-data:/app/app-data
    restart: unless-stopped

  model-analiz:
    build:
      context: .
      dockerfile: services/model_analiz/Dockerfile
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8001"
    volumes:
      - app-data:/app/app-data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  app-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APP_DATA_HOST_PATH}
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_HOST_PATH}
